<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>
  <!-- Background: Apple dark -->
  <rect width="1024" height="1024" rx="228" fill="#1C1C1E"/>
  <!-- Progress ring -->
  <g transform="translate(512,512)">
    <!-- Track (full circle, very subtle) -->
    <circle r="280" fill="none" stroke="white" stroke-opacity="0.07" stroke-width="52"/>
    <!-- Filled arc ~65% (from top-left gap, clockwise) -->
    <path d="M-28,-279 A280,280 0 1,1 -242,140"
          fill="none" stroke="white" stroke-opacity="0.92"
          stroke-width="52" stroke-linecap="round"/>
    <!-- watchOS 26 liquid glass tip: layered glow -->
    <circle cx="-242" cy="140" r="38" fill="white" opacity="0.25" filter="url(#glow)"/>
    <circle cx="-242" cy="140" r="26" fill="white" opacity="0.15"/>
    <circle cx="-242" cy="140" r="13" fill="white" opacity="0.5"/>
  </g>
  <!-- Sparkle (2x, centered) -->
  <g transform="translate(512,512)">
    <path d="M0,-88 C10,-28 28,-10 88,0 C28,10 10,28 0,88 C-10,28 -28,10 -88,0 C-28,-10 -10,-28 0,-88Z" fill="white"/>
  </g>
</svg>
