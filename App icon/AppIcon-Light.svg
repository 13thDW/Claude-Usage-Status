<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>
  <!-- Background: Apple light -->
  <rect width="1024" height="1024" rx="228" fill="#F5F5F7"/>
  <!-- Progress ring -->
  <g transform="translate(512,512)">
    <!-- Track -->
    <circle r="280" fill="none" stroke="#1D1D1F" stroke-opacity="0.07" stroke-width="52"/>
    <!-- Filled arc ~65% -->
    <path d="M-28,-279 A280,280 0 1,1 -242,140"
          fill="none" stroke="#1D1D1F" stroke-opacity="0.88"
          stroke-width="52" stroke-linecap="round"/>
    <!-- Liquid glass tip -->
    <circle cx="-242" cy="140" r="38" fill="#1D1D1F" opacity="0.2" filter="url(#glow)"/>
    <circle cx="-242" cy="140" r="26" fill="#1D1D1F" opacity="0.12"/>
    <circle cx="-242" cy="140" r="13" fill="#1D1D1F" opacity="0.4"/>
  </g>
  <!-- Sparkle -->
  <g transform="translate(512,512)">
    <path d="M0,-88 C10,-28 28,-10 88,0 C28,10 10,28 0,88 C-10,28 -28,10 -88,0 C-28,-10 -10,-28 0,-88Z" fill="#1D1D1F"/>
  </g>
</svg>
